<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Result Checker</title>
  <link rel="stylesheet" href="kiburesults.css" />
</head>
<body>
  <main class="container">
    <h1 align="center">KIBU RESULT REVEALED BY <a href="index.html" target="_blank">ZEBEDAYO MUKISU</a></h1>
    <p align="center">Enter the year of study and admission details to open KIBABII UNIVERSITY result portal directly to print preview.</p>

    <form id="resultForm">
      <label for="year">Year of Study</label>
      <input type="number" id="year" name="year" min="1" max="4" placeholder="Enter year of study" required />

      <label for="admissionNumber">Admission Number</label>
      <input type="text" id="admissionNumber" name="admissionNumber" placeholder="Enter admission number" required />

      <button type="submit">Check Result</button>
    </form>
  </main>
  <script src="script.js"></script>
</body>
</html>
